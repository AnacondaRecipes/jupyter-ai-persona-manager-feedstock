{% set name = "jupyter-ai-persona-manager" %}
{% set version = "0.0.11" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/{{ name.replace('-','_') }}-{{ version }}.tar.gz
  sha256: d2386cf2132e5942b67476521816de34a7e35584f7b9a3cf52d0371f647e1aba

build:
  skip: true  # [py<39]
  number: 0
  script: python -m pip install . -vv

requirements:
  host:
    - python
    - pip
    - hatchling >=1.5.0
    - jupyterlab >=4.0.0,<5
    - hatch-nodejs-version >=0.3.2
    - hatch-jupyter-builder >=0.5
  run:
    - python
    - jupyter_server >=2.4.0,<3
    - jupyter_server_fileid >=0.9.0
    - jupyterlab-chat >=0.19.0
    - pycrdt >=0.10.0
    - pydantic >=2.0.0
    - importlib-metadata >=4.0.0
    - jupyter-ai-router >=0.0.4a0
  run_constrained:
    - jupyterlab >=4.0.0,<5

test:
  imports:
    - jupyter_ai_persona_manager
  requires:
    - pip
  commands:
    - pip check
    - python -c "from importlib.metadata import version; assert(version('{{ name }}')=='{{ version }}')"

about:
  homepage: https://github.com/jupyter-ai-contrib/jupyter-ai-persona-manager
  summary: "The core manager & registry for AI personas in Jupyter AI"
  license: BSD-3-Clause
  license_file: LICENSE
  documentation: https://jupyter-ai.readthedocs.io/
  repository: https://github.com/jupyter-ai-contrib/jupyter-ai-persona-manager

extra:
  recipe-maintainers:
    - dlqqq
    - andrii-i
